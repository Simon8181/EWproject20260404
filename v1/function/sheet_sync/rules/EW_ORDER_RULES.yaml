# =============================================================================
# EW_ORDER_RULES.yaml —「下单 BOL need booking」tab 读取规则（原 EW_SHEET_RULES）
# =============================================================================
# 映射方式（二选一）：
#   - mapping.column_mode: letter  → 用 Excel 列字母 A、B、C、AA…（与表头文字无关）
#   - 省略 letter 且 keys 为第 1 行「单元格原文」→ 按表头文字匹配（旧方式）
# 行范围：layout.header_row / data_start_row（1-based）
#
# 验证列字母：python -m function.sheet_sync --probe --sheet ew_quote_working
# 按规则读取 JSON：python -m function.sheet_sync --sheet ew_quote_working
# 逻辑名 / URL 映射见仓库根目录 EW_CATALOG.yaml
# =============================================================================

ew_order_rules_version: 1

mapping:
  column_mode: letter

source:
  spreadsheet_id: "1cuPIPfP7WYpBI33UVovFAI7wzH8lAOp3PqGOp8idZfU"
  worksheet_id: 589486198

layout:
  header_row: 1
  data_start_row: 2

reading:
  trim_strings: true
  error_tokens_as_empty:
    - "#DIV/0!"
    - "#N/A"
    - "#REF!"
    - "#VALUE!"
  # 列字母模式下写列字母（与上面 columns 的键一致）；表头模式下写第 1 行表头原文
  skip_if_empty:
    - C

postgres:
  table: ew_orders
  primary_key:
    - ew_quote_no

# A 列：看单元格填充色（不是文字）。红→待找车，绿→已经安排；同步时写入 a_cell_status
color_columns:
  A: a_cell_status

# 列字母 → 字段名（与「下单 BOL need booking」第 1 行表头对齐）
# 报价：P=给客户报价，U=给司机报价；其他费用不在 Sheet，由网页追加（见 schema order_fee_addons）
# 接单（下订单/派车）：V/W/X 对应 Broker、Rate、Carriers（含 MC#）。若表上列位置变了，请改下列字母，
# 或改用 mapping.column_mode: header 并用第 1 行表头原文作键（整表统一一种模式）。
columns:
  B: quote_company
  C: ew_quote_no
  D: quote_bol_ref
  E: dat_post_status
  F: status_text
  G: ctn_total
  H: goods_description
  I: ship_from
  J: consignee_contact
  K: consignee_address
  L: weight_lbs
  M: dimensions_class
  N: volume_m3
  O: cargo_value_note
  P: quote_customer
  Q: route_miles_note
  U: quote_driver
  V: booking_broker
  W: booking_rate
  X: carrier_mc
